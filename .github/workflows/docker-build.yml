name: Build and Push Docker Image to Alibaba ACR

on:
  push:
    branches: [ "main" ]   # 每次推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-m3oi1dospt9j921e.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}     # 填你的邮箱 maminde@tom.com
          password: ${{ secrets.ALIYUN_PASSWORD }}     # 阿里云 ACR 密码

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            crpi-m3oi1dospt9j921e.cn-shenzhen.personal.cr.aliyuncs.com/competition_sais_docker/competition_sais_docker_submit:latest
            # 可选：添加更多 tag
            # crpi-m3oi1dospt9j921e.cn-shenzhen.personal.cr.aliyuncs.com/competition_sais_docker/competition_sais_docker_submit:${{ github.sha }}